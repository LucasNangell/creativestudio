<!-- Variação 3: Favicon - Apenas Símbolo, sólido e otimizado para tamanho reduzido --><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none"> <!-- Fundo transparente --> <rect width="64" height="64" fill="transparent" /> <!-- Símbolo Favicon com maior contraste e simplificação --> <g transform="translate(32, 32)"> <!-- Círculo de fundo escuro para garantir contraste máximo em abas (opcional, mas recomendado para favicon) --> <circle cx="0" cy="0" r="30" fill="#0B101B" /> <!-- Anel externo (Cinza Gelo) --> <circle cx="0" cy="0" r="26" stroke="#E0E6ED" stroke-width="3" fill="none" /> <!-- 4 Marcações cardeais principais --> <path d="M0 -26 L0 -20" stroke="#E0E6ED" stroke-width="3" stroke-linecap="round" /> <path d="M0 26 L0 20" stroke="#E0E6ED" stroke-width="3" stroke-linecap="round" /> <path d="M-26 0 L-20 0" stroke="#E0E6ED" stroke-width="3" stroke-linecap="round" /> <path d="M26 0 L20 0" stroke="#E0E6ED" stroke-width="3" stroke-linecap="round" /> <!-- Arco ciano de varredura (mais espesso e visível) --> <path d="M -26 0 A 26 26 0 0 1 -18 -16" stroke="#00E5FF" stroke-width="3.5" fill="none" stroke-linecap="round" /> <!-- Ponto de pulso --> <circle cx="-18" cy="-16" r="4" fill="#00E5FF" /> <!-- Elemento central abstrato condensado (Tribuna/Púlpito estilizado) --> <path d="M-9 -9 L9 -9 L6 8 L-6 8 Z" fill="#0B101B" /> <!-- Detalhe ciano superior simplificado --> <path d="M-9 -9 L9 -9 L7 -5 L-7 -5 Z" fill="#0B101B" /> <line x1="-6" y1="-5" x2="6" y2="-5" stroke="#00E5FF" stroke-width="2.5" /> <!-- Anel tecnológico interno (simplificado) --> <circle cx="0" cy="0" r="12" stroke="#E0E6ED" stroke-width="1.5" stroke-opacity="0.6" fill="none" stroke-dasharray="2 4" /> </g> </svg>
